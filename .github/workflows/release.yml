name: Release

# 桌面 App（tag app-v*）與 VS Code extension（tag ext-v*）的發佈流水線。
# 推 tag 即觸發：在乾淨 runner 上建置產物並建立 / 上傳到對應的 GitHub Release。
# 本機沒有 Inno Setup 時，桌面 App 安裝檔就靠這條 workflow 在 Windows runner 上產生。
on:
  push:
    tags:
      - "app-v*"
      - "ext-v*"

permissions:
  contents: write

jobs:
  desktop:
    if: startsWith(github.ref, 'refs/tags/app-v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps（PyInstaller + Pillow + Inno Setup）
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".Substring(5)
          pwsh installer/build-installer.ps1 -Version $ver

      # 發佈到 PUBLIC 鏡像 repo（免 token 供使用者自動更新）。需 RELEASES_TOKEN（對鏡像有 contents:write 的 PAT）；
      # 未設時 fallback 回本私有 repo（舊行為，不 break），但更新來源指向鏡像故建議設定 PAT。
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ secrets.RELEASES_TOKEN != '' && 'gsinvest017-ai/gs-codex-auto-ai-releases' || github.repository }}
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.Substring(5)
          $asset = "dist/CodexAutoAI-setup-$ver.exe"
          if (-not (Test-Path $asset)) { throw "找不到安裝檔：$asset" }
          $notes = "桌面 App $ver：點圖示啟用 CodexAutoAI，內建自動檢查更新。"
          gh release view $tag --repo $env:TARGET_REPO 2>$null
          if ($LASTEXITCODE -eq 0) { gh release upload $tag $asset --repo $env:TARGET_REPO --clobber }
          else { gh release create $tag $asset --repo $env:TARGET_REPO --target main --title "CodexAutoAI 桌面 App $ver" --notes $notes }

  extension:
    if: startsWith(github.ref, 'refs/tags/ext-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .vsix
        shell: pwsh
        run: pwsh vscode-extension/build-vsix.ps1

      # 發佈到 PUBLIC 鏡像 repo（同桌面 App）。需 RELEASES_TOKEN，未設時 fallback 回本私有 repo。
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ secrets.RELEASES_TOKEN != '' && 'gsinvest017-ai/gs-codex-auto-ai-releases' || github.repository }}
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.Substring(5)  # 去掉 "ext-v" 前綴（5 字元）
          $asset = "dist/codexautoai-$ver.vsix"
          if (-not (Test-Path $asset)) { throw "找不到 .vsix：$asset" }
          $notes = "VS Code extension $ver：自帶框架快照 + 自動檢查更新。"
          gh release view $tag --repo $env:TARGET_REPO 2>$null
          if ($LASTEXITCODE -eq 0) { gh release upload $tag $asset --repo $env:TARGET_REPO --clobber }
          else { gh release create $tag $asset --repo $env:TARGET_REPO --target main --title "CodexAutoAI VS Code extension $ver" --notes $notes }
